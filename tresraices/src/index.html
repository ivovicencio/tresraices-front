<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Tres Raíces - Inmobiliaria y Construcciones</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Tres Raíces - Inmobiliaria y Construcciones en Jujuy. Encontrá el lote ideal para tu hogar. Venta de terrenos y servicios de construcción.">
  <meta name="theme-color" content="#0f2e1e">

  <!-- Open Graph -->
  <meta property="og:title" content="Tres Raíces - Inmobiliaria y Construcciones">
  <meta property="og:description" content="Encontrá el lote ideal para tu hogar en Jujuy. Venta de terrenos y servicios de construcción.">
  <meta property="og:url" content="https://www.tresraices.com.ar">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.tresraices.com.ar/assets/logo-tresraices.png">
  <meta property="og:locale" content="es_AR">
  <meta name="twitter:card" content="summary_large_image">

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
    worker-src 'self' blob:;
    style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net 'unsafe-inline';
    font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
    connect-src 'self';
    img-src 'self' data:;
    frame-src 'none';
    object-src 'none';
    base-uri 'self';
    form-action 'self' https://wa.me;
    navigate-to 'self';
    upgrade-insecure-requests;
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preload" as="image" href="assets/hero-imagen.png">
  <link rel="preload" as="image" href="assets/logo-tresraices.png">
  <link rel="icon" type="image/png" href="assets/R.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
  <body>
  <app-root>
    <div class="app-loading">
      <div class="app-loading-inner">
        <img src="assets/logo-tresraices.png" alt="Tres Raíces" class="app-loading-logo" width="120" height="120">
        <div class="app-loading-bar">
          <div class="app-loading-bar-inner"></div>
        </div>
      </div>
    </div>
    <style>
      .app-loading {
        position:fixed;inset:0;z-index:99999;
        display:flex;align-items:center;justify-content:center;
        background:#0a0a0a;
      }
      .app-loading-inner {
        display:flex;flex-direction:column;align-items:center;gap:1.5rem;
        animation:appFadeIn .6s ease;
      }
      .app-loading-logo {
        width:120px;height:120px;opacity:.6;
        animation:appPulse 2s ease-in-out infinite;
      }
      .app-loading-bar {
        width:160px;height:2px;background:rgba(201,162,65,.1);border-radius:2px;overflow:hidden;
      }
      .app-loading-bar-inner {
        width:40%;height:100%;background:var(--gold-primary,#c9a241);
        border-radius:2px;animation:appLoad 1.4s ease infinite;
      }
      @keyframes appFadeIn {
        from{opacity:0}to{opacity:1}
      }
      @keyframes appPulse {
        0%,100%{opacity:.6}50%{opacity:.9}
      }
      @keyframes appLoad {
        0%{transform:translateX(-100%)}100%{transform:translateX(350%)}
      }
    </style>
  </app-root>
</body>
</html>
